name: Decompile

on:
  workflow_dispatch:
  push:
    paths:
      - 'input/**'

jobs:
  decompile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Ghidra
        id: cache-ghidra
        uses: actions/cache@v4
        with:
          path: ghidra_11.3.2_PUBLIC
          key: ghidra-11.3.2

      - name: Download Ghidra
        if: steps.cache-ghidra.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.3.2_build/ghidra_11.3.2_PUBLIC_20250415.zip
          unzip -q ghidra_11.3.2_PUBLIC_20250415.zip
          rm ghidra_11.3.2_PUBLIC_20250415.zip

      - name: Cache Ghidra projects
        uses: actions/cache@v4
        with:
          path: ~/ghidra_projects
          key: ghidra-projects-${{ hashFiles('input/**') }}
          restore-keys: |
            ghidra-projects-

      - name: Decompile all files
        env:
          JAVA_TOOL_OPTIONS: "-Xmx12g"
        run: |
          mkdir -p output
          PROJ_DIR="$HOME/ghidra_projects"
          mkdir -p "$PROJ_DIR"
          SCRIPT_DIR="$(pwd)/scripts"
          shopt -s nullglob
          for f in input/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            name="${fname%.*}"
            outfile="$(pwd)/output/${name}.c"
            echo "$outfile" > /tmp/ghidra_out_path
            expected=$(sha256sum "$f" | cut -d' ' -f1)
            sidecar="$PROJ_DIR/proj_${name}.hash"
            if [ -f "$PROJ_DIR/proj_${name}.gpr" ] && [ "$(cat "$sidecar" 2>/dev/null)" = "$expected" ]; then
              echo "::group::Decompiling $f (cached project)"
              ./ghidra_11.3.2_PUBLIC/support/analyzeHeadless "$PROJ_DIR" "proj_${name}" \
                -process "$fname" \
                -noanalysis \
                -scriptPath "$SCRIPT_DIR" \
                -postScript DecompileAll.java
            else
              echo "::group::Decompiling $f (fresh analysis)"
              rm -rf "$PROJ_DIR/proj_${name}.gpr" "$PROJ_DIR/proj_${name}.rep"
              ./ghidra_11.3.2_PUBLIC/support/analyzeHeadless "$PROJ_DIR" "proj_${name}" \
                -import "$f" \
                -scriptPath "$SCRIPT_DIR" \
                -preScript DisableAnalyzers.java \
                -postScript DecompileAll.java \
                -analysisTimeoutPerFile 600
              echo "$expected" > "$sidecar"
            fi
            echo "::endgroup::"
            if [ -f "$outfile" ]; then
              lines=$(wc -l < "$outfile")
              echo "::notice::Wrote $lines lines to $outfile"
            else
              echo "::error::Output file not created for $f"
              exit 1
            fi
          done

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "decompile: $(ls output/ | tr '\n' ' ')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin master && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((RANDOM % 5 + 2))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1
    concurrency:
      group: decompile-push
      cancel-in-progress: false
