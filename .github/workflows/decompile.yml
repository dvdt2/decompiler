name: Decompile

on:
  workflow_dispatch:
  push:
    paths:
      - 'input/**.so'

jobs:
  decompile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download Ghidra
        run: |
          wget -q https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.3.2_build/ghidra_11.3.2_PUBLIC_20250415.zip
          unzip -q ghidra_11.3.2_PUBLIC_20250415.zip

      - name: Write decompile script
        run: |
          cat > DecompileAll.java << 'EOF'
          import ghidra.app.decompiler.*;
          import ghidra.program.model.listing.*;
          import ghidra.util.task.ConsoleTaskMonitor;
          import java.io.*;
          import java.nio.file.*;

          public class DecompileAll extends GhidraScript {
              public void run() throws Exception {
                  String outPath = new String(Files.readAllBytes(Paths.get("/tmp/ghidra_out_path"))).trim();
                  DecompInterface decomp = new DecompInterface();
                  decomp.openProgram(currentProgram);
                  FunctionManager fm = currentProgram.getFunctionManager();
                  PrintWriter pw = new PrintWriter(new FileWriter(outPath));
                  for (Function f : fm.getFunctions(true)) {
                      DecompileResults res = decomp.decompileFunction(f, 60, new ConsoleTaskMonitor());
                      if (res != null && res.decompileCompleted()) {
                          pw.println("// " + f.getName());
                          pw.println(res.getDecompiledFunction().getC());
                          pw.println();
                      }
                  }
                  pw.close();
                  decomp.dispose();
                  println("Wrote: " + outPath);
              }
          }
          EOF

      - name: Decompile all .so files
        run: |
          mkdir -p output
          for f in input/*.so; do
            name=$(basename "$f" .so)
            outfile="$(pwd)/output/${name}.c"
            echo "$outfile" > /tmp/ghidra_out_path
            echo "Decompiling $f -> $outfile"
            ./ghidra_11.3.2_PUBLIC/support/analyzeHeadless /tmp ghidra_proj \
              -import "$f" \
              -postScript DecompileAll.java \
              -scriptPath . \
              -deleteProject 2>&1 | grep -i "error\|wrote\|REPORT\|decompile"
            ls -lh "$outfile" 2>/dev/null || echo "WARNING: output file not created"
          done

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/
          git diff --staged --quiet || git commit -m "decompiled output"
          git push
