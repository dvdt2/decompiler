name: Decompile

on:
  workflow_dispatch:
  push:
    paths:
      - 'input/**.so'

jobs:
  decompile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Ghidra
        id: cache-ghidra
        uses: actions/cache@v4
        with:
          path: ghidra_11.3.2_PUBLIC
          key: ghidra-11.3.2

      - name: Download Ghidra
        if: steps.cache-ghidra.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.3.2_build/ghidra_11.3.2_PUBLIC_20250415.zip
          unzip -q ghidra_11.3.2_PUBLIC_20250415.zip
          rm ghidra_11.3.2_PUBLIC_20250415.zip

      - name: Decompile all .so files
        run: |
          mkdir -p output
          SCRIPT_DIR="$(pwd)/scripts"
          shopt -s nullglob
          for f in input/*.so; do
            name=$(basename "$f" .so)
            outfile="$(pwd)/output/${name}.c"
            echo "$outfile" > /tmp/ghidra_out_path
            echo "::group::Decompiling $f"
            ./ghidra_11.3.2_PUBLIC/support/analyzeHeadless /tmp "ghidra_proj_${name}" \
              -import "$f" \
              -scriptPath "$SCRIPT_DIR" \
              -postScript DecompileAll.java \
              -deleteProject \
              -analysisTimeoutPerFile 600
            echo "::endgroup::"
            if [ -f "$outfile" ]; then
              lines=$(wc -l < "$outfile")
              echo "::notice::Wrote $lines lines to $outfile"
            else
              echo "::error::Output file not created for $f"
              exit 1
            fi
          done

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "decompile: $(ls output/ | tr '\n' ' ')"
            git push
          fi
